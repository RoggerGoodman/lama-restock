{% extends 'base.html' %}
{% block title %}Account{% endblock %}
{% block page_title %}Account{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="row mb-4 g-4">

    <div class="col-lg-5">
      <div class="stat-card">
        <h5 class="mb-3"><i class="bi bi-person text-primary"></i> Cambia username</h5>
        <form method="post">
          {% csrf_token %}
          {{ username_form.as_p }}
          <hr class="mt-3">
          <button type="submit" name="change_username" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Salva
          </button>
        </form>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="stat-card">
        <h5 class="mb-3"><i class="bi bi-key text-primary"></i> Cambia password</h5>
        <form method="post">
          {% csrf_token %}
          {{ password_form.as_p }}
          <hr class="mt-3">
          <button type="submit" name="change_password" class="btn btn-primary">
            <i class="bi bi-check-lg"></i> Salva
          </button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
